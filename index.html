<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vertical Category Slider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="phone-frame" aria-label="Animated vertical categories demo">
      <div class="screen">
        <header class="topbar">
          <div class="brand">ebay</div>
          <div class="tagline">Things.People.Love.</div>
        </header>

        <div class="viewport">
          <div class="fade fade-top"></div>
          <ul class="list" id="categoryList" aria-live="polite"></ul>
          <div class="fade fade-bottom"></div>
        </div>
      </div>
    </section>

    <div class="controls" aria-label="Animation controls">
      <button id="toggleBtn" type="button">Pause</button>
      <button id="nextBtn" type="button">Next</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
